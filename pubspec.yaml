name: foodx_customer_app
description: "Foodx Customer App"
publish_to: "none"

version: 1.0.0+4

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  pin_code_fields: ^9.4.0
  geolocator: ^14.0.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/foodx_logo.png
    - assets/images/foodx_icon.png
    - assets/images/foodx_welcome_vip.png
    - assets/images/ah_softtech_logo.png

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/images/foodx_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
